---

- name: Ensure images are tagged
  community.docker.docker_image_tag:
    name: "acore/ac-wotlk-{{ item }}"
    tag: "{{ azerothcore_docker_image_tag }}"
    repository:
      - "{{ azerothcore_docker_registry_address }}/acore/ac-wotlk-{{ item }}"
  loop: "{{ azerothcore_docker_build_images }}"
  become: true

- name: Ensure images are pushed
  community.docker.docker_image_push:
    name: "{{ azerothcore_docker_registry_address }}/acore/ac-wotlk-{{ item }}"
    tag: "{{ azerothcore_docker_image_tag }}"
  loop: "{{ azerothcore_docker_build_images }}"
  become: true
