---

- name: Deploy AzerothCore
  hosts: azerothcore
  vars:
    azerothcore_build_images: true
    azerothcore_deploy_state: "present"
  roles:
    - role: assumptionsandg.azerothcore.azerothcore_install
    - role: assumptionsandg.azerothcore.azerothcore_modules
    - role: assumptionsandg.azerothcore.azerothcore_build
      when: azerothcore_build_images
  tasks:
    - name: Deploy AzerothCore compose
      community.docker.docker_compose_v2:
        project_src: "{{ azerothcore_install_path }}"
        state: "{{ azerothcore_deploy_state }}"
        wait: true
      environment: "{{ azerothcore_install_environment }}"
      become: true
